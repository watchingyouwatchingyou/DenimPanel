      let input = document.getElementById("userInput").value.toLowerCase();
      let response = document.getElementById("response");
      let matches = [];

      // Check if input contains any keywords and preserve their order in the user phrase
      for (let keyword in mapping) {
        let matchIndex = input.indexOf(keyword);
        if (matchIndex !== -1) {
          matches.push({ index: matchIndex, text: mapping[keyword] });
        }
      }

      if (matches.length > 0) {
        matches.sort((a, b) => a.index - b.index);
        response.innerText = matches.map(match => match.text).join(" ");
